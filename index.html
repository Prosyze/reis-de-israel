<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reis de Israel — Mapa Estelar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Inter:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#03030a;font-family:'Inter',system-ui,sans-serif;color:#e2e8f0}

#sky{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;cursor:grab;touch-action:none}
#sky:active{cursor:grabbing}

/* ── HUD topo ── */
.hud-top{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:16px 22px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  background:linear-gradient(180deg,rgba(3,3,10,0.85),transparent);
  pointer-events:none;
}
.hud-top > *{pointer-events:auto}
.brand{
  font-family:'Cinzel',serif;font-weight:900;font-size:1.05rem;
  background:linear-gradient(135deg,#f4c430,#fff8e7,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;
}
.brand small{display:block;font-family:'Inter';font-weight:300;font-size:0.62rem;letter-spacing:2px;-webkit-text-fill-color:#64748b;color:#64748b;margin-top:2px}

.jump-btns{display:flex;gap:6px;flex-wrap:wrap}
.jb{
  padding:5px 13px;border-radius:999px;font-size:0.72rem;cursor:pointer;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  color:#94a3b8;transition:all .2s;white-space:nowrap;font-family:'Inter';
}
.jb:hover{border-color:rgba(244,196,48,.5);color:#f4c430}
/* botão de iniciar a viagem (tour) */
.jb-tour{background:linear-gradient(135deg,rgba(244,196,48,.18),rgba(167,139,250,.18));border-color:rgba(244,196,48,.4);color:#f4c430;font-weight:600}
.jb-tour:hover{background:linear-gradient(135deg,rgba(244,196,48,.3),rgba(167,139,250,.3))}

.search{
  margin-left:auto;position:relative;
}
.search input{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:999px;padding:6px 14px 6px 30px;color:#e2e8f0;font-size:0.76rem;
  width:150px;transition:all .2s;font-family:'Inter';
}
.search input:focus{outline:none;border-color:rgba(244,196,48,.5);width:190px}
.search span{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;font-size:.78rem;pointer-events:none}
/* dropdown de busca */
.search-drop{
  position:absolute;top:calc(100% + 6px);right:0;
  width:min(320px,80vw);
  background:rgba(6,5,18,0.97);backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.12);border-radius:12px;
  overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.7);
  display:none;flex-direction:column;z-index:30;
}
.search-drop.open{display:flex}
.sd-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;border:none;background:transparent;
  color:#e2e8f0;text-align:left;font-family:'Inter';
  transition:background .15s;
}
.sd-item:hover,.sd-item.active{background:rgba(244,196,48,0.08)}
.sd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sd-name{font-size:.84rem;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sd-meta{font-size:.71rem;color:#475569;white-space:nowrap}
.sd-empty{padding:10px 14px;font-size:.8rem;color:#475569;font-style:italic}

/* ── Legenda ── */
.legend{
  position:fixed;left:18px;bottom:18px;z-index:10;
  display:flex;flex-direction:column;gap:5px;
  background:rgba(3,3,10,0.7);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 14px;
  font-size:0.7rem;
}
.lg{display:flex;align-items:center;gap:7px;color:#94a3b8}
.lg b{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}

/* ── Controles zoom ── */
.zoom-ctl{
  position:fixed;right:18px;bottom:18px;z-index:10;
  display:flex;flex-direction:column;gap:6px;
}
.zc{
  width:40px;height:40px;border-radius:10px;cursor:pointer;
  background:rgba(3,3,10,0.7);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);color:#cbd5e1;
  font-size:1.2rem;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.zc:hover{border-color:rgba(244,196,48,.5);color:#f4c430}

.hint{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:9;
  font-size:0.72rem;color:#475569;background:rgba(3,3,10,0.6);
  padding:6px 16px;border-radius:999px;border:1px solid rgba(255,255,255,0.05);
  transition:opacity .6s;pointer-events:none;
}

/* ── Painel detalhe ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:20;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:auto}
/* popup flutuante que abre no local do clique */
.panel{
  position:fixed;z-index:21;
  width:min(380px,calc(100vw - 32px));
  max-height:min(520px,calc(100vh - 32px));
  background:linear-gradient(160deg,#0b0a18,#0f0c20);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  box-shadow:0 24px 70px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.04);
  overflow:hidden;display:flex;flex-direction:column;
  transform-origin:var(--ox,50%) var(--oy,50%);
  transform:scale(0.2);opacity:0;pointer-events:none;
  transition:transform .32s cubic-bezier(.34,1.4,.5,1),opacity .22s ease;
}
.panel.open{transform:scale(1);opacity:1;pointer-events:auto}
.p-bar{height:4px;background:linear-gradient(90deg,#f4c430,#a78bfa,#60a5fa)}
.p-head{padding:22px 24px 16px;background:rgba(11,10,24,.97);border-bottom:1px solid rgba(255,255,255,.06);position:relative;flex-shrink:0}
.p-close{position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#94a3b8;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.p-close:hover{background:rgba(248,113,113,.2);color:#f87171}
.p-eyebrow{font-size:.66rem;text-transform:uppercase;letter-spacing:2px;color:#475569;margin-bottom:7px;font-weight:600}
.p-name{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:900;color:#f8fafc;line-height:1.1;margin-bottom:5px}
.p-dates{color:#64748b;font-size:.8rem;font-weight:300}
.p-body{padding:20px 24px 28px;overflow-y:auto;flex:1}
.p-eval{display:inline-flex;gap:7px;padding:7px 16px;border-radius:999px;font-size:.83rem;font-weight:600;margin-bottom:18px}
.p-eval.bom{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.p-eval.mau{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25)}
.p-eval.misto{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
/* confiança da datação */
.p-conf{display:inline-flex;gap:6px;align-items:center;padding:4px 11px;border-radius:999px;font-size:.72rem;font-weight:600;margin:0 0 18px 8px;cursor:help;border:1px solid transparent}
.p-conf-firme{background:rgba(96,165,250,.1);color:#93c5fd;border-color:rgba(96,165,250,.22)}
.p-conf-aproximada{background:rgba(148,163,184,.1);color:#cbd5e1;border-color:rgba(148,163,184,.22)}
.p-conf-debatida{background:rgba(251,146,60,.1);color:#fdba74;border-color:rgba(251,146,60,.22)}
/* tag de contemporâneo (sincronismo) */
.tag-sync{background:rgba(255,255,255,.06);color:#e2e8f0;border-color:rgba(255,255,255,.16)}
.tag-sync:hover{background:rgba(255,255,255,.14)}
/* nota de cronologia no rodapé do painel */
.p-chrono{margin-top:6px;padding-top:14px;border-top:1px solid rgba(255,255,255,.05);font-size:.7rem;line-height:1.6;color:#475569;font-style:italic}
.p-sec{margin-bottom:22px}
.p-sec-t{font-size:.63rem;text-transform:uppercase;letter-spacing:2px;color:#334155;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:11px;font-weight:700}
.p-text{font-size:.86rem;color:#94a3b8;line-height:1.75}
.p-ev{list-style:none;display:flex;flex-direction:column;gap:7px}
.p-ev li{display:flex;gap:9px;font-size:.82rem;color:#94a3b8;line-height:1.5;padding:8px 11px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.p-ev li::before{content:'✦';color:#f4c430;font-size:.55rem;flex-shrink:0;margin-top:3px}
.p-tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{padding:5px 13px;border-radius:999px;background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2);font-size:.77rem;cursor:pointer;transition:all .2s}
.tag:hover{background:rgba(167,139,250,.22)}
.p-ref{font-size:.81rem;color:#f4c430;font-style:italic;opacity:.85}

/* ── vinheta de planetário (profundidade nas bordas) ── */
.vignette{position:fixed;inset:0;z-index:5;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 52%,rgba(2,1,8,0.55) 100%)}

/* ── cartão narrativo do tour ── */
.tour-card{
  position:fixed;left:50%;bottom:26px;transform:translate(-50%,140%);
  z-index:25;width:min(560px,calc(100vw - 32px));
  background:linear-gradient(160deg,rgba(11,10,24,.97),rgba(15,12,32,.97));
  border:1px solid rgba(244,196,48,.28);border-radius:16px;
  box-shadow:0 22px 60px rgba(0,0,0,.7);
  padding:18px 20px;opacity:0;transition:transform .5s cubic-bezier(.34,1.2,.5,1),opacity .4s;
}
.tour-card.open{transform:translate(-50%,0);opacity:1}
.tour-step{font-size:.64rem;letter-spacing:2px;text-transform:uppercase;color:#f4c430;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.tour-title{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:900;color:#f8fafc;margin-bottom:6px;line-height:1.15}
.tour-text{font-size:.85rem;color:#94a3b8;line-height:1.6;margin-bottom:14px}
.tour-ref{color:#f4c430;font-style:italic;font-size:.78rem;opacity:.85}
.tour-nav{display:flex;gap:8px;margin-top:14px;align-items:center}
.tour-btn{padding:8px 16px;border-radius:999px;font-size:.78rem;font-weight:600;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#e2e8f0;transition:all .2s;font-family:'Inter'}
.tour-btn:hover:not(:disabled){border-color:rgba(244,196,48,.5);color:#f4c430}
.tour-btn:disabled{opacity:.35;cursor:default}
.tour-btn.primary{background:linear-gradient(135deg,#f4c430,#e0a82e);color:#1a1408;border-color:transparent}
.tour-btn.exit{margin-left:auto;background:transparent;border-color:transparent;color:#64748b}
.tour-btn.exit:hover{color:#f87171}
.tour-dots{flex:1;padding:0 10px;display:flex;flex-direction:column;gap:4px}
.tour-bar{height:4px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
.tour-bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#f4c430,#a78bfa);transition:width .4s ease}
.tour-chapter{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:#475569;text-align:center;font-weight:600}

/* ── minimap ── */
.minimap{
  position:fixed;left:18px;top:74px;z-index:9;
  width:240px;height:64px;border-radius:10px;cursor:pointer;
  background:rgba(3,3,10,0.72);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);overflow:hidden;
  transition:opacity .3s,border-color .2s;
}
.minimap:hover{border-color:rgba(244,196,48,.4)}
.minimap canvas{display:block;width:100%;height:100%}

@media(max-width:680px){
  .legend{display:none}
  .brand{font-size:.9rem}
  .search input{width:110px}
  .jump-btns{display:none}
  .minimap{display:none}
  .tour-card{bottom:14px}
}
</style>
</head>
<body>

<canvas id="sky" role="application" tabindex="0"
  aria-label="Mapa estelar interativo dos reis e profetas de Israel (1380–430 a.C.). Use os botões de navegação ou a lista de figuras abaixo para explorar."></canvas>
<div class="vignette" aria-hidden="true"></div>

<!-- minimap (overview da linha do tempo) -->
<div class="minimap" id="minimap" title="Visão geral — clique para navegar" aria-hidden="true">
  <canvas id="miniCv"></canvas>
</div>

<!-- Lista de figuras navegável por teclado/screen-reader (visualmente oculta) -->
<ul id="a11y-list" aria-label="Figuras históricas — pressione Enter para abrir detalhes" style="
  position:fixed;left:-9999px;width:1px;height:1px;overflow:hidden;
  list-style:none;padding:0;margin:0;">
</ul>

<div class="hud-top">
  <a class="brand" href="mapas.html" style="text-decoration:none" title="Ver todos os mapas">✦ Reis de Israel<small>MAPA ESTELAR · 1380 — 430 a.C. · DOS JUÍZES A MALAQUIAS</small></a>
  <div class="jump-btns">
    <button class="jb" data-jump="juizes">Juízes</button>

    <div class="search-drop" id="search-drop" role="listbox" aria-label="Resultados da busca"></div>
  </div>
</div>

<div class="legend">
  <div class="lg"><b style="background:#38bdf8"></b>Juiz</div>
  <div class="lg"><b style="background:#f4c430"></b>Reino Unido</div>
  <div class="lg"><b style="background:#4ade80"></b>Rei fiel a Deus</div>
  <div class="lg"><b style="background:#f87171"></b>Rei ímpio</div>
  <div class="lg"><b style="background:#fbbf24"></b>Rei misto</div>
  <div class="lg"><b style="background:#a78bfa"></b>Profeta</div>
  <div class="lg"><b style="background:#fb923c"></b>Exílio & Retorno</div>
  <div class="lg" style="margin-top:4px;padding-top:7px;border-top:1px solid rgba(255,255,255,.07)"><b style="background:#f4c430;border-radius:0;height:0;border-top:2px dashed #f4c430"></b>Co-regência</div>
  <div class="lg"><b style="background:#6f86b8;border-radius:2px"></b>Faixa = império dominante</div>
  <div class="lg" style="color:#64748b;font-size:.65rem">passe o mouse num rei → contemporâneos</div>
</div>

<div class="zoom-ctl">
  <button class="zc" id="zin" aria-label="Ampliar zoom">+</button>

</div>

<!-- cartão narrativo do tour guiado -->
<div class="tour-card" id="tourCard" role="dialog" aria-label="Viagem guiada pela história">
  <div class="tour-step"><span id="tourStepLabel"></span></div>

<!-- Dados (figuras, impérios, co-regências) — editáveis sem mexer no render -->
<script src="dados.js"></script>
<script>
// ════════════════════════════════════════════════════════
//  COR / LÓGICA DE RENDER
//  (os DADOS vivem em dados.js: JUIZES, UNIDO, NORTE, SUL,
//   PROFETAS, EXILIO, ALL, IMPERIOS, COREGENCIAS)
// ════════════════════════════════════════════════════════
const COLORS={bom:'#4ade80',mau:'#f87171',misto:'#fbbf24',juiz:'#38bdf8',unido:'#f4c430',profeta:'#a78bfa',exilio:'#fb923c'};

// helper: cor de uma figura
function colorOf(d){
  if(d.reino==='exilio'||d.reino==='retorno')return COLORS.exilio;
  if(d.tipo==='profeta')return COLORS.profeta;
  if(d.tipo==='juiz')return COLORS.juiz;
  if(d.reino==='unido')return COLORS.unido;
  return COLORS[d.eval]||'#94a3b8';
}

// ════════════════════════════════════════════════════════
//  LAYOUT NO ESPAÇO  (x = tempo, y = faixa)
// ════════════════════════════════════════════════════════
// Mundo: X em "anos" * PX_PER_YEAR ; Y por faixa
const PX_PER_YEAR=6;
const YEAR_MIN=-1380, YEAR_MAX=-410;
function yearToX(y){return (y-YEAR_MIN)*PX_PER_YEAR}

// Faixas Y (lanes)
const LANE={
  juiz:   0,
  unido:  0,
  norte: -130,   // acima do eixo após divisão
  sul:    130,   // abaixo do eixo
  prof_n:-235,   // profetas do norte logo acima dos reis do norte
  prof_s: 235,   // profetas do sul logo abaixo dos reis do sul
  prof_u:-115,
  exilio: -70,   // exílio e retorno: faixa próxima do eixo central
};
function laneY(d){
  if(d.reino==='exilio'||d.reino==='retorno')return LANE.exilio;
  if(d.tipo==='profeta'){
    if(d.reino==='norte')return LANE.prof_n;
    if(d.reino==='sul')return LANE.prof_s;
    return LANE.prof_u;
  }
  if(d.tipo==='juiz')return LANE.juiz;
  if(d.reino==='unido')return LANE.unido;
  if(d.reino==='norte')return LANE.norte;
  if(d.reino==='sul')return LANE.sul;
  return 0;
}

// posições (com leve jitter vertical determinístico p/ parecer céu)
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffff;return h}
ALL.forEach(d=>{
  d.x=yearToX(d.year);
  const jitter=((hash(d.id)%40)-20);
  d.y=laneY(d)+jitter;
  d.r=3+d.mag*2.4;       // raio base da estrela
  d.col=colorOf(d);
  d.tw=Math.random()*Math.PI*2; // fase de twinkle
});

// Constelações: linhas de sucessão (ordem cronológica por lista)
const LINES=[];
function chain(list,col){
  for(let i=0;i<list.length-1;i++){
    LINES.push({a:list[i],b:list[i+1],col,dash:false});
  }
}
chain(JUIZES,'rgba(56,189,248,0.25)');
chain([...UNIDO],'rgba(244,196,48,0.3)');
// conectar Samuel→Saul (juiz→unido)
LINES.push({a:byId('samuel'),b:byId('saul'),col:'rgba(244,196,48,0.25)'});
chain(NORTE,'rgba(96,165,250,0.22)');
chain(SUL,'rgba(192,132,252,0.22)');
// Salomão -> Roboão (Sul) e Salomão -> Jeroboão I (Norte) : a divisão
LINES.push({a:byId('salomao'),b:byId('roboao'),col:'rgba(192,132,252,0.3)'});
LINES.push({a:byId('salomao'),b:byId('jeroboao1'),col:'rgba(96,165,250,0.3)'});

// linhas pontilhadas profeta -> rei contemporâneo (1 ligação representativa)
function linkProf(profId,kingId){
  const a=byId(profId),b=byId(kingId);
  if(a&&b)LINES.push({a,b,col:'rgba(167,139,250,0.18)',dash:true});
}
linkProf('elias','acabe');
linkProf('eliseu','jeu');
linkProf('nata','davi');
linkProf('isaias','ezequias');
linkProf('jeremias','zedequias');
linkProf('amos','jeroboao2');

const cv=document.getElementById('sky');
const ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cv.style.width=W+'px';cv.style.height=H+'px';
  cv.width=W*DPR;cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',()=>{resize()});
window.addEventListener('load',()=>{resize()});

// camera: world point cam.x,cam.y appears at screen center; scale = zoom
const cam={x:0,y:0,scale:1,tx:0,ty:0,tscale:1};

function worldToScreen(wx,wy){
  return [(wx-cam.x)*cam.scale+W/2,(wy-cam.y)*cam.scale+H/2];
}
function screenToWorld(sx,sy){
  return [(sx-W/2)/cam.scale+cam.x,(sy-H/2)/cam.scale+cam.y];
}

// background stars (parallax)
const BG=[];
for(let i=0;i<400;i++){
  BG.push({x:Math.random()*8000-500,y:Math.random()*1400-700,z:Math.random()*0.5+0.15,r:Math.random()*1.1+0.2,a:Math.random()});
}

let hoverNode=null;
let t0=performance.now();

// ── animação de entrada: cada estrela "acende" em cascata por ano (C) ──
const INTRO_DUR=1.4; // duração total da cascata (s)
(function(){
  const ys=ALL.map(d=>d.year);
  const ymin=Math.min(...ys),ymax=Math.max(...ys);
  ALL.forEach(d=>{
    // delay proporcional à posição no tempo (constelação se formando da esquerda p/ direita)
    d.introDelay=((d.year-ymin)/(ymax-ymin||1))*(INTRO_DUR*0.8);
  });
})();

// ── cometa ocasional (D) ──
let comet=null,nextComet=2.5;
function updateComet(t,dt){
  if(!comet){
    nextComet-=dt;
    if(nextComet<=0){
      const fromLeft=Math.random()<0.5;
      comet={
        x:fromLeft?-60:W+60, y:Math.random()*H*0.5,
        vx:(fromLeft?1:-1)*(380+Math.random()*220),
        vy:120+Math.random()*120, life:0
      };
    }
    return;
  }
  comet.x+=comet.vx*dt; comet.y+=comet.vy*dt; comet.life+=dt;
  if(comet.x<-120||comet.x>W+120||comet.y>H+120){comet=null;nextComet=4+Math.random()*7;}
}
function drawComet(){
  if(!comet)return;
  const tailLen=120;
  const tx=comet.x-comet.vx*0.06, ty=comet.y-comet.vy*0.06;
  const grad=ctx.createLinearGradient(comet.x,comet.y,tx,ty);
  grad.addColorStop(0,'rgba(255,255,255,0.9)');
  grad.addColorStop(1,'transparent');
  ctx.strokeStyle=grad;ctx.lineWidth=2;ctx.beginPath();
  ctx.moveTo(comet.x,comet.y);ctx.lineTo(tx,ty);ctx.stroke();
  ctx.beginPath();ctx.arc(comet.x,comet.y,2.2,0,7);
  ctx.fillStyle='rgba(255,255,255,0.95)';ctx.fill();
}
let lastNow=performance.now();

function draw(now){
  const t=(now-t0)/1000;
  const dt=Math.min(0.05,(now-lastNow)/1000); lastNow=now;
  // ease camera
  cam.x+=(cam.tx-cam.x)*0.12;
  cam.y+=(cam.ty-cam.y)*0.12;
  cam.scale+=(cam.tscale-cam.scale)*0.12;
  updateComet(t,dt);

  ctx.clearRect(0,0,W,H);
  // nebula gradient bg
  const g=ctx.createRadialGradient(W*0.3,H*0.4,0,W*0.3,H*0.4,Math.max(W,H));
  g.addColorStop(0,'#0a0820');g.addColorStop(0.5,'#05040f');g.addColorStop(1,'#020107');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // nebula blobs (fixed-ish, slight parallax)
  drawNebula(W*0.2-cam.x*0.02,H*0.3,300,'rgba(99,102,241,0.10)');
  drawNebula(W*0.7-cam.x*0.03,H*0.6,260,'rgba(139,92,246,0.09)');
  drawNebula(W*0.5-cam.x*0.04,H*0.8,220,'rgba(6,182,212,0.07)');

  // ── faixas de impérios (pano de fundo histórico) ──
  drawImperios();

  // parallax background stars
  for(const s of BG){
    const sx=(s.x-cam.x*s.z)*1+W/2*0 + ((s.x-cam.x*s.z)*0); // simple
    const px=(s.x-cam.x*s.z)+W/2;
    const py=(s.y-cam.y*s.z)+H/2;
    if(px<-10||px>W+10||py<-10||py>H+10)continue;
    const tw=0.4+0.6*Math.abs(Math.sin(t*0.7+s.a*9));
    ctx.beginPath();ctx.arc(px,py,s.r,0,7);
    ctx.fillStyle=`rgba(200,210,255,${tw*0.5})`;ctx.fill();
  }

  // ── estrela cadente ocasional ──
  drawComet();

  // ── eixo do tempo (linha central) ──
  drawTimeAxis(t);

  // ── linhas de constelação ──
  for(const L of LINES){
    const [ax,ay]=worldToScreen(L.a.x,L.a.y);
    const [bx,by]=worldToScreen(L.b.x,L.b.y);
    if(Math.max(ax,bx)<-50||Math.min(ax,bx)>W+50)continue;
    ctx.beginPath();
    ctx.moveTo(ax,ay);ctx.lineTo(bx,by);
    ctx.strokeStyle=L.col;
    ctx.lineWidth=L.coreg?2:(L.dash?1:1.4);
    if(L.dash)ctx.setLineDash(L.coreg?[6,5]:[2,5]);else ctx.setLineDash([]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── sincronismo Norte↔Sul: ao passar o mouse num rei, ligar aos contemporâneos ──
  const syncIds=(hoverNode&&hoverNode.contemporaneos)?new Set(hoverNode.contemporaneos):null;
  if(syncIds){
    const [hx,hy]=worldToScreen(hoverNode.x,hoverNode.y);
    for(const id of syncIds){
      const c=byId(id);if(!c)continue;
      const [cx,cy]=worldToScreen(c.x,c.y);
      const pulse=0.45+0.25*Math.sin(t*3);
      ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(cx,cy);
      ctx.strokeStyle=`rgba(255,255,255,${pulse})`;
      ctx.lineWidth=1.3;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
    }
  }

  // ── estrelas (nodes) ──
  for(const d of ALL){
    const [sx,sy]=worldToScreen(d.x,d.y);
    if(sx<-60||sx>W+60||sy<-60||sy>H+60)continue;
    // entrada em cascata: 0→1 conforme o tempo passa do delay da figura (C)
    const intro=Math.max(0,Math.min(1,(t-d.introDelay)/0.55));
    if(intro<=0)continue;
    const ease=intro<1?1-Math.pow(1-intro,3):1; // easeOutCubic
    const tw=0.75+0.25*Math.sin(t*2+d.tw);
    const r=d.r*cam.scale*tw*(0.3+0.7*ease);
    const isHover=hoverNode===d;
    const isSync=syncIds&&syncIds.has(d.id);
    // ao destacar contemporâneos, escurece quem não participa
    ctx.globalAlpha=((syncIds&&!isHover&&!isSync)?0.28:1)*ease;
    // glow
    const gr=ctx.createRadialGradient(sx,sy,0,sx,sy,r*(isHover?6:4));
    gr.addColorStop(0,d.col+'cc');
    gr.addColorStop(0.4,d.col+'33');
    gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;
    ctx.beginPath();ctx.arc(sx,sy,r*(isHover?6:4),0,7);ctx.fill();
    // core
    ctx.beginPath();ctx.arc(sx,sy,r,0,7);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.beginPath();ctx.arc(sx,sy,r*0.6,0,7);ctx.fillStyle=d.col;ctx.fill();
    // anel de destaque nos contemporâneos
    if(isSync){
      ctx.beginPath();ctx.arc(sx,sy,r+5,0,7);
      ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.4;ctx.stroke();
    }

    // label se zoom suficiente ou hover ou contemporâneo destacado
    if(cam.scale>0.55||isHover||isSync){
      ctx.font=`${isHover?600:500} 12px Inter, sans-serif`;
      ctx.fillStyle=isHover?'#fff':'rgba(235,240,250,0.95)';
      ctx.textAlign='center';
      ctx.fillText(d.nome,sx,sy-r-6);
      if(isHover){
        ctx.font='400 11px Inter';ctx.fillStyle='rgba(190,205,225,0.95)';
        ctx.fillText(d.datas,sx,sy+r+13);
      }
    }
    ctx.globalAlpha=1;
  }
  // o agendamento do próximo frame fica em loop() (ver bloco de PERFORMANCE)
}

function drawNebula(x,y,r,col){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,col);g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();
}

// hex (#rrggbb) -> 'r,g,b' para usar com alfa variável
function rgbOf(hex){
  const n=parseInt(hex.slice(1),16);
  return `${(n>>16)&255},${(n>>8)&255},${n&255}`;
}

// faixas verticais por império dominante, ao longo do eixo do tempo
function drawImperios(){
  if(typeof IMPERIOS==='undefined')return;
  for(const im of IMPERIOS){
    const [xa]=worldToScreen(yearToX(im.y0),0);
    const [xb]=worldToScreen(yearToX(im.y1),0);
    const left=Math.min(xa,xb), w=Math.abs(xb-xa);
    if(left>W+40||left+w<-40)continue;
    const rgb=rgbOf(im.cor);
    // banda suave, mais visível nas bordas para sugerir "transição de era"
    const grad=ctx.createLinearGradient(left,0,left+w,0);
    grad.addColorStop(0,   `rgba(${rgb},0.10)`);
    grad.addColorStop(0.12,`rgba(${rgb},0.05)`);
    grad.addColorStop(0.88,`rgba(${rgb},0.05)`);
    grad.addColorStop(1,   `rgba(${rgb},0.10)`);
    ctx.fillStyle=grad;
    ctx.fillRect(left,0,w,H);
    // linha divisória sutil no início da era
    ctx.beginPath();ctx.moveTo(left,0);ctx.lineTo(left,H);
    ctx.strokeStyle=`rgba(${rgb},0.18)`;ctx.lineWidth=1;ctx.stroke();
    // rótulo no alto, centralizado na faixa (some se a faixa estiver muito estreita)
    if(w>70){
      const cx=Math.max(60,Math.min(W-60,left+w/2));
      ctx.font='600 12px Cinzel, serif';
      ctx.textAlign='center';
      ctx.fillStyle=`rgba(${rgb},0.55)`;
      ctx.fillText(im.nome.toUpperCase(),cx,26);
    }
  }
}

function drawTimeAxis(t){
  // linha central (eixo) onde ficam juízes/unido; depois da divisão vira referência
  const [x0,yc]=worldToScreen(yearToX(YEAR_MIN),0);
  const [x1]=worldToScreen(yearToX(YEAR_MAX),0);
  ctx.beginPath();ctx.moveTo(x0,yc);ctx.lineTo(x1,yc);
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.stroke();

  // marcas de século
  ctx.textAlign='center';
  for(let y=-1300;y<=-400;y+=100){
    const [sx]=worldToScreen(yearToX(y),0);
    if(sx<-40||sx>W+40)continue;
    ctx.beginPath();ctx.moveTo(sx,yc-5);ctx.lineTo(sx,yc+5);
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.stroke();
    ctx.font='400 11px Inter';ctx.fillStyle='rgba(180,195,220,0.95)';
    ctx.fillText(Math.abs(y)+' a.C.',sx,yc+18);
  }

  // marcos — marcos principais sempre; secundários só com zoom suficiente
  for(const m of MARKERS){
    const principal = m.big||m.fall;
    if(!principal && cam.scale<0.6) continue;
    const [sx]=worldToScreen(yearToX(m.year),0);
    if(sx<-120||sx>W+120)continue;
    const col=m.fall==='norte'?'#60a5fa':m.fall==='sul'?'#c084fc':m.exile?'#fb923c':m.big?'#f4c430':'#94a3b8';
    // linha vertical (só ao redor do eixo central, não a tela toda)
    const top=Math.max(40,yc-200), bot=Math.min(H-40,yc+200);
    ctx.beginPath();ctx.moveTo(sx,top);ctx.lineTo(sx,bot);
    ctx.strokeStyle=col+(m.big?'55':'33');
    ctx.lineWidth=m.big?2:1;ctx.setLineDash(m.big?[]:[3,6]);
    ctx.stroke();ctx.setLineDash([]);
    // label ancorado logo ACIMA do eixo central (junto das estrelas)
    const ly=yc-58;
    // fundo sutil para destacar do céu
    ctx.font=`${m.big?700:600} ${m.big?15:13}px Cinzel, serif`;
    const tw=ctx.measureText(m.label).width;
    ctx.fillStyle='rgba(3,3,12,0.55)';
    ctx.fillRect(sx-tw/2-8,ly-15,tw+16,38);
    ctx.fillStyle=col;ctx.textAlign='center';
    ctx.fillText(m.label,sx,ly);
    ctx.font='400 11px Inter';ctx.fillStyle='rgba(210,220,238,0.95)';
    ctx.fillText(m.sub,sx,ly+15);
  }
}

let dragging=false,moved=false,lastX,lastY,downX,downY;

cv.addEventListener('pointerdown',e=>{
  dragging=true;moved=false;
  lastX=downX=e.clientX;lastY=downY=e.clientY;
  cv.setPointerCapture(e.pointerId);
  // se o usuário começa a arrastar durante o tour, ele assume o controle
  if(typeof tourActive==='function'&&tourActive())tourExit();
});
cv.addEventListener('pointermove',e=>{
  if(dragging){
    const dx=(e.clientX-lastX)/cam.scale, dy=(e.clientY-lastY)/cam.scale;
    cam.tx-=dx;cam.ty-=dy;cam.x-=dx;cam.y-=dy;
    lastX=e.clientX;lastY=e.clientY;
    if(Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY)>4)moved=true;
    hideHint();
  }else{
    hoverNode=pick(e.clientX,e.clientY);
    cv.style.cursor=hoverNode?'pointer':'grab';
  }
});
cv.addEventListener('pointerup',e=>{
  dragging=false;
  if(!moved){
    const n=pick(e.clientX,e.clientY);
    if(n)openPanel(n);
  }
});
cv.addEventListener('pointercancel',()=>dragging=false);

cv.addEventListener('wheel',e=>{
  e.preventDefault();
  hideHint();
  const [wx,wy]=screenToWorld(e.clientX,e.clientY);
  const factor=e.deltaY<0?1.18:1/1.18;
  let ns=Math.max(0.18,Math.min(4,cam.tscale*factor));
  // zoom centrado no cursor
  cam.tscale=ns;cam.scale=ns; // snap scale for accurate anchor
  const [nwx,nwy]=screenToWorld(e.clientX,e.clientY);
  cam.tx+=wx-nwx;cam.ty+=wy-nwy;cam.x+=wx-nwx;cam.y+=wy-nwy;
},{passive:false});

function pick(sx,sy){
  let best=null,bd=22*22;
  for(const d of ALL){
    const [px,py]=worldToScreen(d.x,d.y);
    const dist=(px-sx)**2+(py-sy)**2;
    const rad=Math.max(14,d.r*cam.scale+10);
    if(dist<rad*rad && dist<bd){bd=dist;best=d}
  }
  return best;
}

const searchEl=document.getElementById('search');
const dropEl=document.getElementById('search-drop');
let dropItems=[],dropActive=-1;

function searchScore(d,q){
  // retorna pontuação de relevância (maior = melhor); 0 = não bate
  const nome=d.nome.toLowerCase();
  const ref=(d.ref||'').toLowerCase();
  const tribo=(d.tribo||'').toLowerCase();
  const evs=(d.eventos||[]).join(' ').toLowerCase();
  if(nome.startsWith(q))return 4;
  if(nome.includes(q))return 3;
  if(ref.includes(q))return 2;
  if(tribo.includes(q)||evs.includes(q))return 1;
  return 0;
}

function openDropResult(d){
  dropClose();
  searchEl.value='';
  cam.tx=d.x;cam.ty=d.y;cam.tscale=1.5;
  hoverNode=d;
  setTimeout(()=>openPanel(d),320);
  hideHint();
}

function dropRender(results){
  dropEl.innerHTML='';
  dropActive=-1;
  if(!results.length){
    dropEl.innerHTML='<div class="sd-empty">Nenhum resultado.</div>';
    dropEl.classList.add('open');
    searchEl.setAttribute('aria-expanded','true');
    return;
  }
  dropItems=results;
  results.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.className='sd-item';
    btn.setAttribute('role','option');
    btn.setAttribute('id','sd-opt-'+i);
    btn.innerHTML=`<span class="sd-dot" style="background:${d.col}"></span>
      <span class="sd-name">${d.nome}</span>
      <span class="sd-meta">${d.datas||''}</span>`;
    btn.onclick=()=>openDropResult(d);
    dropEl.appendChild(btn);
  });
  dropEl.classList.add('open');
  searchEl.setAttribute('aria-expanded','true');
}

function dropClose(){
  dropEl.classList.remove('open');
  searchEl.setAttribute('aria-expanded','false');
  dropItems=[];dropActive=-1;
}

function dropSetActive(i){
  const btns=[...dropEl.querySelectorAll('.sd-item')];
  btns.forEach(b=>b.classList.remove('active'));
  dropActive=Math.max(0,Math.min(i,btns.length-1));
  btns[dropActive]?.classList.add('active');
  searchEl.setAttribute('aria-activedescendant','sd-opt-'+dropActive);
}

searchEl.addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  if(!q){dropClose();return;}
  const scored=ALL
    .map(d=>({d,s:searchScore(d,q)}))
    .filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s||a.d.year-b.d.year)
    .slice(0,7)
    .map(x=>x.d);
  dropRender(scored);
});

searchEl.addEventListener('keydown',function(e){
  if(!dropEl.classList.contains('open')){
    if(e.key==='Enter'){
      const q=this.value.toLowerCase().trim();if(!q)return;
      const hit=ALL.find(d=>searchScore(d,q)>0);
      if(hit)openDropResult(hit);
    }
    return;
  }
  if(e.key==='ArrowDown'){e.preventDefault();dropSetActive(dropActive+1);}
  else if(e.key==='ArrowUp'){e.preventDefault();dropSetActive(dropActive-1);}
  else if(e.key==='Enter'){
    e.preventDefault();
    if(dropActive>=0&&dropItems[dropActive])openDropResult(dropItems[dropActive]);
  }
  else if(e.key==='Escape'){dropClose();this.value='';}
});

document.addEventListener('click',e=>{
  if(!e.target.closest('.search'))dropClose();
});

const tipoLabel={juiz:'Juiz de Israel',rei:'Rei',profeta:'Profeta'};
const reinoLabel={unido:'Reino Unido',norte:'Reino do Norte · Israel',sul:'Reino do Sul · Judá',exilio:'Exílio na Babilônia',retorno:'Pós-Exílio · O Retorno'};
function openPanel(d){
  const evalIco={bom:'✅',mau:'❌',misto:'⚠️'};
  const evalTxt={bom:'Fiel a Deus',mau:'Ímpio — fez o mal aos olhos do Senhor',misto:'Avaliação Mista'};
  document.getElementById('p-type').textContent=tipoLabel[d.tipo]+(d.reino?' · '+reinoLabel[d.reino]:'');
  document.getElementById('p-name').textContent=d.nome;
  document.getElementById('p-dates').textContent=d.datas+(d.anos>0?` · ${d.anos} anos de governo`:'');

  // confiança da datação
  const confInfo={
    firme:{ico:'◆',txt:'Datação firme',nota:'Datas bem estabelecidas pela cronologia da monarquia (Thiele).'},
    aproximada:{ico:'◈',txt:'Datação aproximada',nota:'Datas estimadas; há alguma variação entre estudiosos.'},
    debatida:{ico:'◇',txt:'Datação debatida',nota:'A cronologia deste período (sobretudo dos juízes) é bastante discutida.'},
  };
  const conf=confInfo[d.confianca];

  let h='';
  if(d.eval)h+=`<div class="p-eval ${d.eval}">${evalIco[d.eval]} ${evalTxt[d.eval]}</div>`;
  if(conf)h+=`<div class="p-conf p-conf-${d.confianca}" title="${conf.nota}">${conf.ico} ${conf.txt}</div>`;
  h+=`<div class="p-sec"><div class="p-sec-t">Quem foi</div><p class="p-text">${d.desc}</p></div>`;
  if(d.eventos?.length)h+=`<div class="p-sec"><div class="p-sec-t">Principais eventos</div><ul class="p-ev">${d.eventos.map(e=>`<li>${e}</li>`).join('')}</ul></div>`;
  if(d.profetas?.length)h+=`<div class="p-sec"><div class="p-sec-t">Profetas contemporâneos</div><div class="p-tags">${d.profetas.map(p=>`<span class="tag" data-go="${p}">📜 ${p}</span>`).join('')}</div></div>`;
  // sincronismo Norte↔Sul: reis do outro reino que reinaram em paralelo
  if(d.contemporaneos?.length){
    const tags=d.contemporaneos.map(id=>{const c=byId(id);return c?`<span class="tag tag-sync" data-go-id="${c.id}">✦ ${c.nome}</span>`:''}).join('');
    if(tags)h+=`<div class="p-sec"><div class="p-sec-t">Reinou em paralelo (outro reino)</div><div class="p-tags">${tags}</div></div>`;
  }
  if(d.tribo)h+=`<div class="p-sec"><div class="p-sec-t">Tribo / Origem</div><p class="p-text">${d.tribo}</p></div>`;
  h+=`<div class="p-sec"><div class="p-sec-t">Referência bíblica</div><p class="p-ref">📖 ${d.ref}</p></div>`;
  if(conf)h+=`<div class="p-chrono">${conf.nota} Cronologia da monarquia baseada em E. Thiele.</div>`;
  document.getElementById('p-body').innerHTML=h;

  // ── posiciona o popup junto da estrela clicada ──
  const panel=document.getElementById('panel');
  const [sx,sy]=worldToScreen(d.x,d.y);     // posição da estrela na tela
  const pw=Math.min(380,window.innerWidth-32);
  const ph=Math.min(520,window.innerHeight-32);
  // tenta abrir à direita da estrela; se não couber, à esquerda
  let left = sx+24;
  if(left+pw > window.innerWidth-16) left = sx-24-pw;
  left = Math.max(16, Math.min(left, window.innerWidth-pw-16));
  let top = sy-60;
  top = Math.max(16, Math.min(top, window.innerHeight-ph-16));
  // origem da animação = ponto da estrela relativo ao card (efeito de "surgir da estrela")
  const ox=Math.max(0,Math.min(pw,sx-left));
  const oy=Math.max(0,Math.min(ph,sy-top));
  panel.style.left=left+'px';
  panel.style.top=top+'px';
  panel.style.setProperty('--ox',ox+'px');
  panel.style.setProperty('--oy',oy+'px');

  panel.classList.add('open');
  document.getElementById('overlay').classList.add('open');
  // deep-link: atualiza hash sem empurrar para o histórico (A)
  history.replaceState(null,'','#'+d.id);
  // foco no botão fechar para teclado/screen-reader (C)
  setTimeout(()=>document.getElementById('pclose').focus(),60);
  // clicar tag de profeta voa até ele (por nome)
  document.querySelectorAll('.tag[data-go]').forEach(tag=>{
    tag.onclick=()=>{
      const name=tag.dataset.go.toLowerCase();
      const hit=ALL.find(x=>x.nome.toLowerCase().startsWith(name.split(' ')[0]));
      if(hit){cam.tx=hit.x;cam.ty=hit.y;cam.tscale=1.5;hoverNode=hit;openPanel(hit)}
    };
  });
  // clicar tag de contemporâneo voa até ele (por id, exato)
  document.querySelectorAll('.tag[data-go-id]').forEach(tag=>{
    tag.onclick=()=>{
      const hit=byId(tag.dataset.goId);
      if(hit){cam.tx=hit.x;cam.ty=hit.y;cam.tscale=1.5;hoverNode=hit;openPanel(hit)}
    };
  });
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  // limpa o hash sem deixar entrada no histórico (A)
  history.replaceState(null,'',window.location.pathname+window.location.search);
}
document.getElementById('pclose').onclick=closePanel;
document.getElementById('overlay').onclick=closePanel;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()});

//  DEEP-LINKING: abre a figura indicada no #hash  (A)
// ════════════════════════════════════════════════════════
function openFromHash(){
  const id=decodeURIComponent(window.location.hash.replace(/^#/,''));
  if(!id)return false;
  const d=byId(id);
  if(d){cam.tx=d.x;cam.ty=d.y;cam.tscale=1.5;hoverNode=d;openPanel(d);return true;}
  return false;
}
// responde ao usuário editar o hash manualmente / botão voltar
window.addEventListener('hashchange',()=>{
  if(!window.location.hash)closePanel();
  else openFromHash();
});

// ════════════════════════════════════════════════════════
//  PERFORMANCE: pausa o loop quando a aba está oculta  (D)
// ════════════════════════════════════════════════════════
let rafId=null;
let miniTick=0;
function loop(now){
  rafId=requestAnimationFrame(loop);
  draw(now);
  // minimap não precisa de 60fps — atualiza a cada ~4 frames
  if((miniTick++&3)===0)miniDraw();
}
function startLoop(){if(rafId===null)rafId=requestAnimationFrame(loop);}
function stopLoop(){if(rafId!==null){cancelAnimationFrame(rafId);rafId=null;}}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden)stopLoop();else startLoop();
});

let tourIdx=-1;
const tourCard=document.getElementById('tourCard');

// rótulo da "era" de cada parada (mostrado abaixo da barra de progresso)
function tourChapter(s){
  const y=s.year;
  if(s.lane===-130)return 'Reino do Norte · Israel';
  if(s.lane===130)return y<=-925?'A Divisão':'Reino do Sul · Judá';
  if(s.lane===-30)return 'Exílio & Retorno';
  // lane central (0): juízes → unido → divisão
  if(y<=-1055)return 'Era dos Juízes';
  if(y<=-945)return 'Reino Unido';
  return 'A Divisão';
}

function tourGoto(i){
  tourIdx=Math.max(0,Math.min(i,TOUR.length-1));
  const s=TOUR[tourIdx];
  closePanel();
  flyTo(s);
  document.getElementById('tourStepLabel').textContent=`Parada ${tourIdx+1} de ${TOUR.length}`;
  document.getElementById('tourTitle').textContent=s.title;
  document.getElementById('tourText').textContent=s.text;
  document.getElementById('tourRef').textContent='📖 '+s.ref;
  document.getElementById('tourPrev').disabled=tourIdx===0;
  const next=document.getElementById('tourNext');
  next.textContent=tourIdx===TOUR.length-1?'Concluir ✓':'Próximo ▶';
  // barra de progresso + capítulo (era)
  const pct=((tourIdx+1)/TOUR.length)*100;
  document.getElementById('tourDots').innerHTML=
    `<div class="tour-bar"><i style="width:${pct}%"></i></div>`+
    `<div class="tour-chapter">${tourChapter(s)}</div>`;
  hideHint();
}
function tourEnter(){tourCard.classList.add('open');tourGoto(0);}
function tourExit(){tourCard.classList.remove('open');tourIdx=-1;flyTo(VIEWS.all);}
function tourNext(){if(tourIdx>=TOUR.length-1)tourExit();else tourGoto(tourIdx+1);}
function tourPrev(){tourGoto(tourIdx-1);}
const tourActive=()=>tourIdx>=0;

document.getElementById('tourStart').onclick=tourEnter;
document.getElementById('tourNext').onclick=tourNext;
document.getElementById('tourPrev').onclick=tourPrev;
document.getElementById('tourExit').onclick=tourExit;
document.addEventListener('keydown',e=>{
  if(!tourActive())return;
  if(e.key==='ArrowRight')tourNext();
  else if(e.key==='ArrowLeft')tourPrev();
  else if(e.key==='Escape')tourExit();
});

// ════════════════════════════════════════════════════════
//  MINIMAP  (B)  — overview da linha do tempo, clicável
// ════════════════════════════════════════════════════════
const miniCv=document.getElementById('miniCv');
const miniCtx=miniCv.getContext('2d');
let MW,MH;
function miniResize(){
  const r=miniCv.getBoundingClientRect();
  MW=r.width;MH=r.height;
  miniCv.width=MW*DPR;miniCv.height=MH*DPR;
  miniCtx.setTransform(DPR,0,0,DPR,0,0);
}
// mundo X total -> minimap X
function worldXspan(){return [yearToX(YEAR_MIN),yearToX(YEAR_MAX)];}
function miniDraw(){
  if(!MW)return;
  miniCtx.clearRect(0,0,MW,MH);
  const [wx0,wx1]=worldXspan(),span=wx1-wx0;
  const toMiniX=wx=>((wx-wx0)/span)*MW;
  // bandas de impérios em miniatura
  if(typeof IMPERIOS!=='undefined'){
    for(const im of IMPERIOS){
      const a=toMiniX(yearToX(im.y0)),b=toMiniX(yearToX(im.y1));
      miniCtx.fillStyle=`rgba(${rgbOf(im.cor)},0.22)`;
      miniCtx.fillRect(Math.min(a,b),0,Math.abs(b-a),MH);
    }
  }
  // pontos das figuras
  for(const d of ALL){
    const mx=toMiniX(d.x);
    const my=MH/2+(d.y/700)*MH*0.6;
    miniCtx.beginPath();miniCtx.arc(mx,Math.max(3,Math.min(MH-3,my)),1.3,0,7);
    miniCtx.fillStyle=d.col;miniCtx.fill();
  }
  // retângulo do viewport atual
  const [vx0]=screenToWorld(0,0),[vx1]=screenToWorld(W,0);
  const rx0=toMiniX(vx0),rx1=toMiniX(vx1);
  miniCtx.strokeStyle='rgba(244,196,48,0.9)';miniCtx.lineWidth=1.5;
  miniCtx.strokeRect(rx0,1,Math.max(4,rx1-rx0),MH-2);
  miniCtx.fillStyle='rgba(244,196,48,0.10)';
  miniCtx.fillRect(rx0,1,Math.max(4,rx1-rx0),MH-2);
}
document.getElementById('minimap').addEventListener('click',e=>{
  const r=miniCv.getBoundingClientRect();
  const frac=(e.clientX-r.left)/r.width;
  const [wx0,wx1]=worldXspan();
  cam.tx=wx0+frac*(wx1-wx0);
  if(cam.tscale<0.5)cam.tscale=0.7;
  hideHint();
});

// ── INIT ──
resize();
miniResize();
window.addEventListener('resize',miniResize);
flyTo(VIEWS.all);
cam.x=cam.tx;cam.y=cam.ty;cam.scale=cam.tscale;
// se a URL já vier com #figura, abre direto nela (e mantém a câmera lá)
if(openFromHash()){cam.x=cam.tx;cam.y=cam.ty;}
startLoop();
</script>
